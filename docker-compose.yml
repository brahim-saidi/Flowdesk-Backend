services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      - ORACLE_PASSWORD=pass123
      - ORACLE_DATABASE=XEPDB1
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init-scripts:/docker-entrypoint-initdb.d/startup
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "system/pass123@//localhost:1521/XEPDB1", "AS", "SYSDBA", "SELECT 1 FROM DUAL"]
      interval: 30s
      timeout: 20s
      retries: 15
      start_period: 240s
    networks:
      - app-network
