services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-postgres
    environment:
      POSTGRES_DB: ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ticket-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ticket-pgdata:
