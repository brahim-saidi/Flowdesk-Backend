# Application Name
spring.application.name=ticket

# PostgreSQL (override secrets in application-local.properties — see that file's example if present)
spring.datasource.url=jdbc:postgresql://localhost:5432/ticket
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# CORS: comma-separated origins allowed to call /api/** (React/Vite, CRA, Angular dev servers)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4200,http://127.0.0.1:5173,http://127.0.0.1:3000,http://127.0.0.1:4200

# JWT (override jwt.secret in production / application-local.properties — min 32 bytes for HS256)
jwt.secret=${JWT_SECRET:DevOnlySecretKeyMustBe32BytesLong!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
